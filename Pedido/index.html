<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido de Namoro</title>
</head>
<style>
    body{
        background: linear-gradient(pink, #ff0080);
        background-repeat: no-repeat;
        background-size: cover;
        background-attachment: fixed;
    }
    h1{
        text-align: center;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 90px;
    }
    .botoes{
        display: flex;
        justify-content: space-evenly;
    }
    button{
        background-color: black;
        color: white;
        font-size: 40px;
        border-radius: 15px;
        padding: 15px 30px;
        width: 200px;
        border: none;
        cursor: pointer;
    }
    button:active{
        transform: scale(0.9);
    }
</style>
<body>
    <h1>Quer namorar comigo?</h1>
    <div class="botoes">
        <div class="botaoS">
            <button onclick="sim()">Sim</button>
        </div>

        <div class="botaoN">
            <button onclick="desvia()" id="botao" onmouseover="desvia()">Não</button>
        </div>
    </div>

    <script>
        function sim(){
            location.href = "https://www.youtube.com/watch?v=ICS6uKC93w0"
        }

        function desvia(){
            let botao = document.getElementById("botao")
            botao.style.position = "Absolute"
            botao.style.bottom = gerarPosicao(10,80)
            botao.style.left = gerarPosicao(10,80)
        }

        function gerarPosicao(min, max){
            return(Math.random() * (max-min)+min)+"%"
        }
    </script>
</body>
</html>
